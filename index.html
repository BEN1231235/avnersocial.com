<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Mon Réseau Social</title>

<style>
body{
    font-family: Arial;
    background:#f0f2f5;
    margin:0;
}

header{
    background:#1877f2;
    color:white;
    padding:15px;
    text-align:center;
}

.container{
    max-width:600px;
    margin:20px auto;
}

.box{
    background:white;
    padding:15px;
    border-radius:10px;
}

textarea{
    width:100%;
    height:80px;
    padding:10px;
}

button{
    background:#1877f2;
    color:white;
    border:none;
    padding:10px;
    margin-top:10px;
    cursor:pointer;
}

.post{
    background:white;
    padding:15px;
    margin-top:10px;
    border-radius:10px;
}

.like{
    color:red;
    cursor:pointer;
}
</style>
</head>

<body>

<header>
<h1>Mon Réseau Social 🚀</h1>
</header>

<div class="container">

<div class="box">
<textarea id="text" placeholder="Écris quelque chose..."></textarea>
<button onclick="addPost()">Publier</button>
</div>

<div id="posts"></div>

</div>

<script>

function addPost(){
    let text = document.getElementById("text").value;

    if(text.trim() === ""){
        alert("Écris quelque chose !");
        return;
    }

    let post = document.createElement("div");
    post.className = "post";

    post.innerHTML = `
        <p>${text}</p>
        <span class="like" onclick="like(this)">❤️ 0</span>
    `;

    document.getElementById("posts").prepend(post);
    document.getElementById("text").value="";
}

function like(el){
    let count = parseInt(el.innerText.split(" ")[1]);
    count++;
    el.innerHTML = "❤️ " + count;
}

</script>

</body>
</html>
